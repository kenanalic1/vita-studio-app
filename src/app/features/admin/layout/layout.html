<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">V</div>
      <div class="logo-text">
        Vita Studio
        <div class="logo-sub">Novi Pazar</div>
      </div>
    </div>

    <span class="sidebar-section-label">GLAVNO</span>
    <nav>
      <a routerLink="/admin/pregled" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="layout-dashboard" [size]="16" [strokeWidth]="2"></lucide-icon> Pregled
      </a>
      <a routerLink="/admin/kalendar" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="calendar" [size]="16" [strokeWidth]="2"></lucide-icon> Kalendar
      </a>
      <a routerLink="/admin/rezervacije" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="clipboard-list" [size]="16" [strokeWidth]="2"></lucide-icon> Rezervacije
      </a>
    </nav>

    <span class="sidebar-section-label">LJUDI</span>
    <nav>
      <a routerLink="/admin/clanice" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="users" [size]="16" [strokeWidth]="2"></lucide-icon> Članice
      </a>
      <a routerLink="/admin/treneri" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="dumbbell" [size]="16" [strokeWidth]="2"></lucide-icon> Treneri
      </a>
    </nav>

    <span class="sidebar-section-label">PONUDA</span>
    <nav>
      <a routerLink="/admin/aktivnosti" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="zap" [size]="16" [strokeWidth]="2"></lucide-icon> Aktivnosti
      </a>
      <a routerLink="/admin/clanarine" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="credit-card" [size]="16" [strokeWidth]="2"></lucide-icon> Članarine
      </a>
      <a routerLink="/admin/sale" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="building-2" [size]="16" [strokeWidth]="2"></lucide-icon> Sale i tereni
      </a>
    </nav>

    <span class="sidebar-section-label">OPERATIVA</span>
    <nav>
      <a routerLink="/admin/checkin" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="user-check" [size]="16" [strokeWidth]="2"></lucide-icon> Check-in
      </a>
      <a routerLink="/admin/lista-cekanja" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="clock" [size]="16" [strokeWidth]="2"></lucide-icon> Lista čekanja
      </a>
      <a routerLink="/admin/izvestaji" routerLinkActive="active">
        <lucide-icon class="nav-icon" name="bar-chart-2" [size]="16" [strokeWidth]="2"></lucide-icon> Izveštaji
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="avatar">{{ initials }}</div>
      <div class="user-info">
        <div class="user-name">{{ user?.ime }} {{ user?.prezime }}</div>
        <div class="user-role">Administrator</div>
      </div>
      <button (click)="logout()" class="logout-btn" title="Odjava">→</button>
    </div>
  </aside>

  <main class="main-content">
  <router-outlet (activate)="onActivate($event)"></router-outlet>
</main>
</div>
