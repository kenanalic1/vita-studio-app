<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VitaStudioApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    app-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    app-admin-layout, app-trener-layout, app-clan-layout {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
    }

    app-admin-pregled, app-clanice-lista, app-clan-profil,
    app-treneri-lista, app-kalendar, app-aktivnosti, app-clanarine,
    app-sale, app-checkin-admin, app-izvestaji, app-rezervacije-admin,
    app-trener-pregled, app-trener-raspored, app-checkin-trener,
    app-ucesnice, app-clan-pocetna, app-raspored-browse,
    app-moje-rezervacije, app-moj-profil, app-moja-clanarina {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
